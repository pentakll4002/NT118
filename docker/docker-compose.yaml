services:
  postgres:
    image: postgres:15-alpine
    container_name: nt118-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nt118
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ../database/seed_vouchers.sql:/docker-entrypoint-initdb.d/02-seed-vouchers.sql
      - ../database/validation_triggers.sql:/docker-entrypoint-initdb.d/03-triggers.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nt118-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: nt118-backend
    restart: unless-stopped
    ports:
      - "5058:5058"
    environment:
      - ConnectionStrings__DefaultConnection=Host=nt118-postgres;Port=5432;Database=nt118;Username=postgres;Password=postgres
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_ENABLE_SSL=true
      - SMTP_FROM_EMAIL=hiroplayga@gmail.com
      - SMTP_FROM_NAME=NT118 App
      - SMTP_APP_PASSWORD=hemd yilb eyid qscu
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/wwwroot/uploads
    networks:
      - nt118-network

  ai-agentic:
    build:
      context: ../ai-agentic
      dockerfile: Dockerfile
    container_name: nt118-ai-agentic
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DATABASE_URL=postgresql://postgres:postgres@nt118-postgres:5432/nt118
      - BACKEND_URL=http://nt118-backend:5058
      - CORE_SERVICE_URL=http://nt118-backend:5058
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - MODEL_TYPE=${MODEL_TYPE:-groq}
      - GROQ_MODEL=${GROQ_MODEL:-openai/gpt-oss-120b}
      - GROQ_TIMEOUT=120
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_PROJECT=nt118-chatbot
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - nt118-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_API_URL: http://localhost:5058
        EXPO_PUBLIC_CHATBOT_URL: http://localhost:8000
    container_name: nt118-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - ai-agentic
    networks:
      - nt118-network

  db-seed:
    build:
      context: ..
      dockerfile: docker/Dockerfile.seed
    container_name: nt118-db-seed
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - nt118-network

networks:
  nt118-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads: