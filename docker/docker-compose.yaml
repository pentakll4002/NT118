version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nt118-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nt118
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: nt118-backend
    restart: unless-stopped
    ports:
      - "5058:5058"
    environment:
      - ConnectionStrings__DefaultConnection=Host=nt118-postgres;Port=5432;Database=nt118;Username=postgres;Password=postgres
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_ENABLE_SSL=true
      - SMTP_FROM_EMAIL=hiroplayga@gmail.com
      - SMTP_FROM_NAME=NT118 App
      - SMTP_APP_PASSWORD=hemd yilb eyid qscu
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/wwwroot/uploads

  # ai:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.ai
  #   container_name: nt118-ai
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - MODEL_TYPE=groq
  #     - GROQ_API_KEY=your_key_here
  #   depends_on:
  #     - backend

  db-seed:
    build:
      context: ..
      dockerfile: docker/Dockerfile.seed
    container_name: nt118-db-seed
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  backend_uploads: